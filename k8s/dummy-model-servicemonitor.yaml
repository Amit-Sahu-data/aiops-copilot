apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dummy-model-server
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: dummy-model-server
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 10s